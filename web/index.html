    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    iframe {
      border: 0;
      width: 100%;
      height: 100%;
      background: #000;
    }
  </style>

  <iframe
    title="Ayene Matrix live stream"

  ></iframe>
